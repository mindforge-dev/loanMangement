name: CI / CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── 1. Build Frontend ────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── 2. Build Backend ─────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install & compile
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: |
            backend/dist/
            backend/package.json
            backend/package-lock.json

  # ── 3. Deploy to VPS (main branch only) ──────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Debug Environment Secrets
        run: |
          echo "Checking if environment secrets are present..."
          echo "VPS_HOST is set: ${{ secrets.VPS_HOST != '' }}"
          echo "VPS_USER is set: ${{ secrets.VPS_USER != '' }}"
          echo "VPS_SSH_KEY is set: ${{ secrets.VPS_SSH_KEY != '' }}"
          echo "VPS_PORT is set: ${{ secrets.VPS_PORT != '' }}"
          echo "VPS_PROJECT_PATH is set: ${{ secrets.VPS_PROJECT_PATH != '' }}"
          echo "VPS_BACKEND_APP_PATH is set: ${{ secrets.VPS_BACKEND_APP_PATH != '' }}"
          echo "VPS_BACKEND_PM2_NAME is set: ${{ secrets.VPS_BACKEND_PM2_NAME != '' }}"
          echo "VPS_FRONTEND_DIST_PATH is set: ${{ secrets.VPS_FRONTEND_DIST_PATH != '' }}"
          echo "VPS_FRONTEND_WEB_ROOT is set: ${{ secrets.VPS_FRONTEND_WEB_ROOT != '' }}"
          echo "VPS_FRONTEND_PM2_NAME is set: ${{ secrets.VPS_FRONTEND_PM2_NAME != '' }}"

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist/

      - name: Download backend dist
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: backend-dist/

      - name: Copy frontend dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: frontend-dist/
          target: ${{ secrets.VPS_FRONTEND_DIST_PATH }}
          strip_components: 1

      - name: Copy backend dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: backend-dist/
          target: ${{ secrets.VPS_BACKEND_APP_PATH }}
          strip_components: 1

      - name: Restart services on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Update repository scripts on the VPS first
            PROJECT_PATH=$(echo "${{ secrets.VPS_PROJECT_PATH }}" | xargs)
            cd "$PROJECT_PATH"
            git fetch origin main
            git reset --hard origin/main

            # Deploy backend (install prod deps + restart pm2 app)
            export APP_DIR=$(echo "${{ secrets.VPS_BACKEND_APP_PATH }}" | xargs)
            export PM2_NAME=$(echo "${{ secrets.VPS_BACKEND_PM2_NAME }}" | xargs)
            bash scripts/deploy-backend.sh

            # Deploy frontend (rsync dist to web root + reload pm2 app if needed)
            export DIST_DIR=$(echo "${{ secrets.VPS_FRONTEND_DIST_PATH }}" | xargs)
            export WEB_ROOT=$(echo "${{ secrets.VPS_FRONTEND_WEB_ROOT }}" | xargs)
            export PM2_NAME=$(echo "${{ secrets.VPS_FRONTEND_PM2_NAME }}" | xargs)
            bash scripts/deploy-frontend.sh
